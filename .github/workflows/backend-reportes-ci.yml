name: Backend CI - Reportes

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'MicroservicioReportes/**'
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'MicroservicioReportes/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar y empaquetar con Maven
        # Se omiten los tests (-DskipTests) por dependencia de PostgreSQL y RabbitMQ
        run: mvn -pl MicroservicioReportes -am clean package -DskipTests

      - name: Verificar artefacto generado
        run: ls -l MicroservicioReportes/target/*.jar