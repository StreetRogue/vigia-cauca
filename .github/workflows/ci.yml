name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  CACHE_NAME: npm-cache-${{ github.sha }}
  WORKING_DIR: ./Frontend-Vigia

jobs:
  # Job 1: Validar estructura y cambios
  validate:
    name: Validar Estructura del Proyecto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar ramas protegidas
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] && [[ "${{ github.event_name }}" == "push" ]]; then
            echo "❌ No se puede hacer push directo a main. Usa Pull Request."
            exit 1
          fi
          echo "✅ Rama válida"

      - name: Validar estructura de carpetas (Atomic Design + Hexagonal)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Verificar que existen directorios clave
          required_dirs=(
            "src/core/domain"
            "src/core/application"
            "src/presentation/atoms"
            "src/presentation/molecules"
            "src/presentation/organisms"
            "src/presentation/templates"
            "src/presentation/pages"
            "src/infrastructure"
            "src/shared"
          )
          
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "⚠️  Directorio faltante: $dir"
            fi
          done
          echo "✅ Estructura de carpetas validada"

      - name: Validar commits (Conventional Commits)
        if: github.event_name == 'pull_request'
        run: |
          echo "Validando commits en PR..."
          git log origin/develop..HEAD --format="%B" | while read line; do
            if [[ $line =~ ^(feat|fix|docs|style|refactor|test|chore|perf)(\(.+\))?:.+ ]]; then
              echo "✅ Commit válido: $line"
            elif [[ -z "$line" ]]; then
              continue
            else
              echo "❌ Commit no sigue Conventional Commits: $line"
            fi
          done

  # Job 2: Instalar dependencias
  install:
    name: Instalar Dependencias
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Frontend-Vigia/package-lock.json'

      - name: Instalar dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Verificar vulnerabilidades en dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm audit --audit-level=moderate || true

  # Job 3: Linting
  lint:
    name: Linting con ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Frontend-Vigia/package-lock.json'

      - name: Instalar dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Ejecutar ESLint
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run lint
        continue-on-error: false

      - name: Comentar resultados en PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **ESLint encontró errores.** Por favor, ejecuta `npm run lint:fix` localmente y haz push de nuevo.'
            })

  # Job 4: Formato (Prettier)
  format:
    name: Validar Formato (Prettier)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Frontend-Vigia/package-lock.json'

      - name: Instalar dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Verificar formato con Prettier
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run format:check
        continue-on-error: false

      - name: Comentar resultados en PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **El código no sigue el formato estándar.** Ejecuta `npm run format` localmente.'
            })

  # Job 5: Tests
  test:
    name: Tests (Vitest)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Frontend-Vigia/package-lock.json'

      - name: Instalar dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Ejecutar tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm test

      - name: Generar cobertura
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:coverage
        continue-on-error: true

      - name: Subir cobertura a Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./Frontend-Vigia/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Comentar cobertura en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const fs = require('fs');
              const coverage = require('./Frontend-Vigia/coverage/coverage-summary.json');
              const lines = coverage.total.lines.pct;
              const branches = coverage.total.branches.pct;
              const functions = coverage.total.functions.pct;
              const statements = coverage.total.statements.pct;
              
              const body = `📊 **Cobertura de Tests:**
              - Lines: ${lines}%
              - Branches: ${branches}%
              - Functions: ${functions}%
              - Statements: ${statements}%
              
              ${lines >= 80 ? '✅' : '⚠️'} Cobertura general`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              })
            } catch (e) {
              console.log('No coverage report found');
            }

  # Job 6: Build
  build:
    name: Build con Vite
    runs-on: ubuntu-latest
    needs: [lint, test, format]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'Frontend-Vigia/package-lock.json'

      - name: Instalar dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Ejecutar build
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com

      - name: Verificar tamaño de bundle
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "📦 Tamaño del bundle: $SIZE"
          if [ $(du -s dist/ | cut -f1) -gt 5242880 ]; then
            echo "⚠️  Bundle muy grande (> 5MB). Considera optimizar."
          fi

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: Frontend-Vigia/dist/
          retention-days: 5

  # Job 7: Resumen
  summary:
    name: Resumen de Checks
    runs-on: ubuntu-latest
    needs: [validate, lint, format, test, build]
    if: always()
    steps:
      - name: Determinar estado general
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" ]] || \
             [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.format.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Algunos checks fallaron"
            exit 1
          else
            echo "✅ Todos los checks pasaron"
          fi

      - name: Comentar estado en PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const validate = '${{ needs.validate.result }}' === 'success' ? '✅' : '❌';
            const lint = '${{ needs.lint.result }}' === 'success' ? '✅' : '❌';
            const format = '${{ needs.format.result }}' === 'success' ? '✅' : '❌';
            const test = '${{ needs.test.result }}' === 'success' ? '✅' : '❌';
            const build = '${{ needs.build.result }}' === 'success' ? '✅' : '❌';
            
            const body = `## 🔍 Resumen de CI/CD
            
            | Check | Estado |
            |-------|--------|
            | Validación | ${validate} |
            | ESLint | ${lint} |
            | Prettier | ${format} |
            | Tests | ${test} |
            | Build | ${build} |
            
            **Último actualizado:** ${new Date().toLocaleString()}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
