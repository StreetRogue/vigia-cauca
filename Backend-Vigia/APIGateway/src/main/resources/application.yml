
server:
  port: 8080

spring:
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true

  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/security-realm-dev}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/security-realm-dev/protocol/openid-connect/certs}
          audience: ${JWT_AUDIENCE:http://localhost:8180/realms/security-realm-dev}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # =========================
            # USUARIOS
            # =========================
            - id: usuarios
              uri: http://micro-usuarios:8081
              predicates:
                - Path=/api/*/usuarios/**
              filters:
                - StripPrefix=2

            # =========================
            # NOVEDADES
            # El micro-novedades usa path completo /api/v1/microNovedades/...
            # por eso StripPrefix=0 (no se elimina nada del path)
            # =========================
            - id: novedades
              uri: http://micro-novedades:5003
              predicates:
                - Path=/api/*/microNovedades/**
              filters:
                - StripPrefix=0

            # =========================
            # REPORTES/ESTADISTICAS/SSE
            # El micro-reportes usa path completo /api/v1/reportes/...
            # StripPrefix=0 conserva el path completo.
            # DedupeResponseHeader elimina el header CORS duplicado que
            # micro-reportes agrega ademas del que ya pone el gateway.
            # =========================
            - id: reportes
              uri: http://micro-reportes:5004
              predicates:
                - Path=/api/*/reportes/**
              filters:
                - StripPrefix=0
                - DedupeResponseHeader=Access-Control-Allow-Origin RETAIN_FIRST

            # =========================
            # UBICACIONES
            # El micro-ubicaciones usa @RequestMapping("/municipios") sin prefijo
            # /api/v1 propio. StripPrefix=3 elimina /api + /v1 + /microUbicaciones
            # dejando /municipios/... que es lo que espera el controlador.
            # =========================
            - id: ubicaciones
              uri: http://micro-ubicaciones:8082
              predicates:
                - Path=/api/*/microUbicaciones/**
              filters:
                - StripPrefix=3

# ===========================
# JWT CUSTOM CONFIG
# ===========================
jwt:
  auth:
    converter:
      principle-attribute: preferred_username
      api-client: ${KEYCLOAK_CLIENT_ID:api-gateway}

# ===========================
# KEYCLOAK
# ===========================

keycloak:
  token-url: ${KEYCLOAK_TOKEN_URL:http://localhost:8180/realms/security-realm-dev/protocol/openid-connect/token}
  logout-url: ${KEYCLOAK_LOGOUT_URL:http://localhost:8180/realms/security-realm-dev/protocol/openid-connect/logout}
  client-id: ${KEYCLOAK_CLIENT_ID:api-gateway}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:IbFLyi0YoqRirQz1c2Bh5qB16eXh3tKg}

# ===========================
# LOGGING
# ===========================
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
    org.springframework.security: DEBUG

