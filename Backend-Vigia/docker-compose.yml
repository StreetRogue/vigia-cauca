# docker-compose.yml
services:

  # ─────────────────────────────────────────
  # INFRAESTRUCTURA
  # ─────────────────────────────────────────

  postgres-usuarios:
    image: postgres:16-alpine
    container_name: postgres-usuarios
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USUARIOS_DB}
      POSTGRES_USER: ${USUARIOS_DB_USER}
      POSTGRES_PASSWORD: ${USUARIOS_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_usuarios_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USUARIOS_DB_USER} -d ${USUARIOS_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ubicaciones:
    image: postgres:16-alpine
    container_name: postgres-ubicaciones
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${UBICACIONES_DB}
      POSTGRES_USER: ${UBICACIONES_DB_USER}
      POSTGRES_PASSWORD: ${UBICACIONES_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_ubicaciones_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UBICACIONES_DB_USER} -d ${UBICACIONES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-novedades:
    image: postgres:16-alpine
    container_name: postgres-novedades
    restart: unless-stopped
    environment:
      POSTGRES_DB: novedades_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_novedades_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novedades_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-reportes:
    image: postgres:16-alpine
    container_name: postgres-reportes
    restart: unless-stopped
    environment:
      POSTGRES_DB: estadisticas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_reportes_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estadisticas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: localhost:8180
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: reencrypt
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realms:/opt/keycloak/data/import
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90' /proc/net/tcp6"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  keycloak-init:
    image: alpine:3.19
    container_name: keycloak-init
    volumes:
      - ./keycloak/init-admin-user.sh:/init-admin-user.sh:ro
    command: sh -c "apk add --no-cache curl -q && sh /init-admin-user.sh"
    networks:
      - backend
    depends_on:
      - keycloak
    restart: on-failure

  # =========================================
  # MICROSERVICIOS
  # =========================================

  micro-usuarios:
    build:
      context: ./micro-usuarios
      dockerfile: Dockerfile
    container_name: micro-usuarios
    restart: unless-stopped
    env_file:
      - ./micro-usuarios/.env
    ports:
      - "${USUARIOS_PORT}:${USUARIOS_PORT}"
    networks:
      - backend
    depends_on:
      postgres-usuarios:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  micro-ubicaciones:
    build:
      context: ./micro-ubicaciones
      dockerfile: Dockerfile
    container_name: micro-ubicaciones
    restart: unless-stopped
    env_file:
      - ./micro-ubicaciones/.env
    ports:
      - "${UBICACIONES_PORT}:${UBICACIONES_PORT}"
    networks:
      - backend
    depends_on:
      postgres-ubicaciones:
        condition: service_healthy

  api-gateway:
    build:
      context: ./APIGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - ./APIGateway/.env
    ports:
      - "8080:8080"
    networks:
      - backend
    depends_on:
      keycloak:
        condition: service_healthy

  micro-novedades:
    build:
      context: ./MicroservicioNovedades
      dockerfile: Dockerfile
    container_name: micro-novedades
    restart: unless-stopped
    env_file:
      - ./MicroservicioNovedades/.env
    ports:
      - "5003:5003"
    volumes:
      - evidencias_data:/app/evidencias
    networks:
      - backend
    depends_on:
      postgres-novedades:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  micro-reportes:
    build:
      context: ./MicroservicioReportes
      dockerfile: Dockerfile
    container_name: micro-reportes
    restart: unless-stopped
    env_file:
      - ./MicroservicioReportes/.env
    ports:
      - "5004:5004"
    volumes:
      - reportes_data:/app/reportes-temp
    networks:
      - backend
    depends_on:
      postgres-reportes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

# =========================================
# VOLÚMENES Y RED
# =========================================

volumes:
  postgres_usuarios_data:
  postgres_ubicaciones_data:
  postgres_novedades_data:
  postgres_reportes_data:
  rabbitmq_data:
  keycloak_data:
  evidencias_data:
  reportes_data:

networks:
  backend:
    driver: bridge
