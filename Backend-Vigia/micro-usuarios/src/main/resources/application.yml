server:
  port: ${APP_PORT:8081}

spring:
  application:
    name: micro-usuarios
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  web:
    error:
      include-exception: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm-name: ${KEYCLOAK_REALM_NAME}
  realm-master: ${KEYCLOAK_REALM_MASTER}
  admin-cli: ${KEYCLOAK_ADMIN_CLI}
  user-console: ${KEYCLOAK_USER_CONSOLE}
  console-password: ${KEYCLOAK_CONSOLE_PASSWORD}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

# ===========================
# JWT CUSTOM CONFIG
# ===========================
jwt:
  auth:
    converter:
      principle-attribute: preferred_username
      api-client: ${KEYCLOAK_CLIENT_ID}

ubicaciones:
  url: http://micro-ubicaciones:8082

logging:
  level:
    org.springframework.security: INFO