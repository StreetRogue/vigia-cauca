# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Clientes REST
clients:
  usuarios:
    base-url: ${CLIENTS_USUARIOS_BASE_URL:http://localhost:8081}

# RabbitMQ Queue
rabbitmq:
  queue:
    name: ${RABBITMQ_QUEUE_NAME:cola.novedades.notificaciones}

# Logging
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    co.edu.unicauca.micronovedades: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.amqp: DEBUG